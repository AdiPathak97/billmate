name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24.15.0'  # pinned, not floating

jobs:
  lint-and-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-modules
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/shared/node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Lint
        run: npm run lint

      - name: Type-check web
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Type-check api
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Test
        run: npm test --workspaces -- --passWithNoTests

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo owner
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/api:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/api:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/api:cache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/web:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/web:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/web:cache,mode=max